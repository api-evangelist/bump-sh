specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Bump.sh
providerId: bump-sh
created: '2026-05-04'
modified: '2026-05-22'
tags:
  - API Changelog
  - API Documentation
  - API Hub
  - AsyncAPI
  - CI/CD
  - OpenAPI
description: >-
  Machine-readable plans and pricing for Bump.sh, sourced from
  https://bump.sh/pricing. Bump.sh meters seats and API documentations rather
  than API requests; the same SaaS subscription includes API access for
  publishing documentation from CI. An Open Source program also offers free
  Pro-equivalent access on application.
sourceUrl: https://bump.sh/pricing
plans:
  - id: bump-sh-basic
    name: Basic
    type: paid
    description: >-
      Entry SaaS tier with OpenAPI/AsyncAPI support, CLI, GitHub integration,
      custom domain/logo, and documentation hubs.
    entries:
      - label: Monthly Price
        description: Flat monthly subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        domains:
          - https://bump.sh
        unit: 1
        price: '50.00'
        currency: USD
        userMultiplied: false
      - label: API Documentations
        description: Number of distinct API documentations included
        name: api_docs
        type: quota
        metric: api_docs
        limit: 10
        timeFrame: month
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Internal Users
        description: Internal team members with editor access
        name: internal_users
        type: quota
        metric: users
        limit: 3
        timeFrame: month
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: External Guests
        description: External read-only guests
        name: external_guests
        type: quota
        metric: users
        limit: 20
        timeFrame: month
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: OpenAPI Support
      - name: AsyncAPI Support
      - name: CLI
      - name: GitHub Integration
      - name: Custom Domain
      - name: Custom Logo
      - name: Documentation Hubs
      - name: Bump.sh API
  - id: bump-sh-pro
    name: Pro
    type: paid
    description: >-
      Includes everything in Basic plus branches management, API Explorer,
      CI integration, release rollback, and automatic changelog.
    entries:
      - label: Monthly Price
        description: Flat monthly subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        domains:
          - https://bump.sh
        unit: 1
        price: '250.00'
        currency: USD
        userMultiplied: false
      - label: API Documentations
        description: Number of distinct API documentations included
        name: api_docs
        type: quota
        metric: api_docs
        limit: 30
        timeFrame: month
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Internal Users
        description: Internal team members with editor access
        name: internal_users
        type: quota
        metric: users
        limit: 5
        timeFrame: month
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: External Guests
        description: External read-only guests
        name: external_guests
        type: quota
        metric: users
        limit: 40
        timeFrame: month
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Branches Management
      - name: API Explorer
      - name: CI Integration
      - name: Release Rollback
      - name: Automatic Changelog
      - name: All Basic Features
      - name: Bump.sh API
  - id: bump-sh-custom
    name: Custom
    type: enterprise
    description: >-
      Contact-for-pricing enterprise tier with unlimited docs, users and
      guests; adds SSO, reverse proxy, embed mode, custom analytics/reports,
      custom legal/invoicing, and a 99.99% SLA.
    entries:
      - label: Monthly Price
        description: Negotiated; contact sales
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: configurable
        domains:
          - https://bump.sh
        unit: 1
        price: custom
        currency: USD
        userMultiplied: false
