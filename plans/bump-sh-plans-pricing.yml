        description: Unlimited documentations
        name: api_docs
        type: quota
        metric: api_docs
        limit: -1
        timeFrame: month
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Internal Users
        description: Unlimited internal users
        name: internal_users
        type: quota
        metric: users
        limit: -1
        timeFrame: month
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: External Guests
        description: Unlimited external guests
        name: external_guests
        type: quota
        metric: users
        limit: -1
        timeFrame: month
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
