aid: bump-sh
name: Bump.sh
description: >-
  Bump.sh is an API documentation and changelog platform that automatically
  generates beautiful, interactive documentation from OpenAPI and AsyncAPI
  specifications. It provides diff-based changelogs, API hubs, webhooks, and
  team collaboration features for API-first organizations.
