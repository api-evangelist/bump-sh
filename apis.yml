aid: bump-sh
name: Bump.sh
description: >-
  Bump.sh is "the modern API doc platform" — automatic, diff-aware
  documentation for OpenAPI and AsyncAPI specifications, plus a managed
  Model Context Protocol (MCP) platform that compiles Flower or Arazzo
  workflow documents into deterministic, observable MCP servers for AI
  agents. Customers include Aviobook, MongoDB, Elastic, Lightspeed, and BigID.
type: Index
kind: company
