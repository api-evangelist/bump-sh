apis:
  - aid: bump-sh:bump-sh-api
    name: Bump.sh API
    description: >-
      The Bump.sh REST API allows programmatic management of API documentation,
      deployments, and changelogs. Integrates with CI/CD pipelines to
      automatically publish OpenAPI and AsyncAPI spec changes as versioned
      documentation with visual diffs.
    humanURL: https://bump.sh
    baseURL: https://bump.sh/api/v1
    tags:
