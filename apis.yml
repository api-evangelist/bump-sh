    name: Bump.sh API
    description: >-
      Official Bump.sh REST API (v1) for documentation, branches, hubs,
      diffs, previews, validations, and MCP-server deployments. Powers the
      CLI, the GitHub Action, and direct CI integrations. 15 operations
      across 9 tags, with one outbound webhook (DocStructureChange).
