apiVersion: naftiko.io/v1
kind: SharedCapability
metadata:
  id: bump-sh-api
  name: Bump.sh API
  provider: bump-sh
  api: bump-sh-api
  documentation: https://developers.bump.sh
  source: openapi/bump-sh-openapi.yaml
spec:
  baseURL: https://bump.sh/api/v1
  authentication:
    type: http
    scheme: token
    description: Use a documentation, hub, or organization access token in the Authorization header as `Token {token}`.
  operations:
    - id: createDiff
      method: POST
      path: /diffs
      summary: Create a Diff
      tags: [Diffs]
    - id: getDiff
      method: GET
      path: /diffs/{id}
      summary: Fetch Detailed Information from an Existing Diff
      tags: [Diffs]
    - id: listHubs
      method: GET
      path: /hubs
      summary: List All Hubs
      tags: [Hubs]
    - id: getHub
      method: GET
      path: /hubs/{hub_id_or_slug}
      summary: Fetch Information of an Existing Hub
      tags: [Hubs]
    - id: createVersion
      method: POST
      path: /versions
      summary: Create a New Version
      tags: [Versions]
    - id: getVersion
      method: GET
      path: /versions/{version_id}
      summary: Fetch a Full Documentation Version Including Diff Summary
      tags: [Versions]
    - id: listBranches
      method: GET
      path: /docs/{doc_id_or_slug}/branches
      summary: List Available Branches
      tags: [Branches]
    - id: createBranch
      method: POST
      path: /docs/{doc_id_or_slug}/branches
      summary: Create a New Branch
      tags: [Branches]
    - id: deleteBranch
      method: DELETE
      path: /docs/{doc_id_or_slug}/branches/{slug}
      summary: Delete a Branch
      tags: [Branches]
    - id: setDefaultBranch
      method: PATCH
      path: /docs/{doc_id_or_slug}/branches/{slug}/set_default
      summary: Promote Branch as the Default One
      tags: [Branches]
    - id: validate
      method: POST
      path: /validations
      summary: Validate a Documentation Definition
      tags: [Validations]
    - id: createPreview
      method: POST
      path: /previews
      summary: Create a Preview
      tags: [Previews]
    - id: updatePreview
      method: PUT
      path: /previews/{preview_id}
      summary: Update an Existing Preview
      tags: [Previews]
    - id: ping
      method: GET
      path: /ping
      summary: Check the API Status
      tags: [Ping]
    - id: deployMcpServer
      method: POST
      path: /mcp_servers/{mcp_server_id_or_slug}/deploy
      summary: Deploy a New MCP Server Document
      tags: [MCP Servers]
  webhooks:
    - id: docStructureChange
      summary: Notification when a documentation structure changes.
