specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Bump.sh
providerId: bump-sh
publisherName: Bump.sh
serviceCategory: API
created: '2026-05-04'
modified: '2026-05-22'
tags:
  - API Changelog
  - API Documentation
  - API Hub
  - AsyncAPI
  - CI/CD
  - OpenAPI
  - FinOps
  - Cost Management
  - FOCUS
description: >-
  FinOps framework definition for the Bump.sh SaaS + API surface. Bump.sh
  meters subscription tier, internal seats, external guests, and number of
  API documentations (not raw API requests), with the addition of MCP-server
  workflow executions for AI-agent consumers. Provides a FOCUS-aligned
  mapping for cost allocation, usage measurement, and unit-economics
  reporting.
principles:
  - name: Visibility
    description: Make API consumption costs visible to engineering, product, and finance teams in near
      real-time.
  - name: Allocation
    description: Tag every chargeable API call with the consuming team, environment, application, and
      feature so cost can be allocated.
  - name: Optimization
    description: Continuously evaluate request patterns, caching, batching, and tier selection to reduce
      cost per useful unit of work.
  - name: Accountability
    description: Establish budget owners and chargeback or showback flows for each consuming team.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Cloud Sustainability
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Bump.sh
  ServiceCategory: Developer Tools / API
  ProviderName: Bump.sh
  PublisherName: Bump.sh
  InvoiceIssuerName: Bump.sh
  PricingCategory: Usage-Based
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: subscription_seats
    description: Internal seats consumed under the active plan
    unit: seat
    aggregation: max
    dimensions:
      - tier
      - organization
  - name: external_guests
    description: External read-only guests on a documentation
    unit: seat
    aggregation: max
    dimensions:
      - tier
      - organization
  - name: api_docs
    description: Number of distinct API documentations published
    unit: documentation
    aggregation: max
    dimensions:
      - tier
      - organization
      - hub
  - name: api_requests
    description: Count of API requests against the Bump.sh REST API (CI/CD deploys, diffs, validations, MCP deploys)
    unit: request
    aggregation: sum
    dimensions:
      - endpoint
      - tier
      - consumer
  - name: mcp_executions
    description: Executions of a hosted MCP-server workflow on behalf of an AI agent
    unit: execution
    aggregation: sum
    dimensions:
      - mcp_server
      - workflow
      - tier
      - consumer
apis:
  - name: Bump.sh API
    baseURL: https://bump.sh/api/v1
    tags:
      - API Changelog
      - API Documentation
      - CI/CD
      - Deployments
      - OpenAPI
    serviceName: Bump.sh API
    serviceCategory: API
unitEconomics:
  - name: Cost per 1K Requests
    metric: billed_cost / (api_requests / 1000)
    target: TBD
  - name: Cost per Active Consumer
    metric: billed_cost / active_consumers
    target: TBD
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
